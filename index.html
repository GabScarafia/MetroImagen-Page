<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Evitar caché del navegador -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>METRO IMAGEN</title>

  <!-- Google Fonts: Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;800&display=swap" rel="stylesheet">

  <!-- Swiper.js CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
  <link rel="stylesheet" href="styles.css?v=1.79">

  <!-- Meta Pixel Code -->
  <script>
    !function (f, b, e, v, n, t, s) {
      if (f.fbq) return; n = f.fbq = function () {
        n.callMethod ?
          n.callMethod.apply(n, arguments) : n.queue.push(arguments)
      };
      if (!f._fbq) f._fbq = n; n.push = n; n.loaded = !0; n.version = '2.0';
      n.queue = []; t = b.createElement(e); t.async = !0;
      t.src = v; s = b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t, s)
    }(window, document, 'script',
      'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', 'YOUR_PIXEL_ID');
    fbq('track', 'PageView');
  </script>
  <noscript>
    <img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=YOUR_PIXEL_ID&ev=PageView&noscript=1" />
  </noscript>
  <!-- End Meta Pixel Code -->
</head>

<body>

  <header class="header">
    <div class="logo">
      <img src="img/Logo.png" alt="METRO IMAGEN" style="height: 50px; width: auto; display: block;">
    </div>
    <button id="menu-toggle" class="menu-toggle" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>
    <nav id="nav-menu">
      <a href="#inicio">INICIO</a>
      <a href="#nosotros">NOSOTROS</a>
      <a href="#productos">PRODUCTOS</a>
      <a href="#contacto">CONTACTO</a>
    </nav>
  </header>

  <!-- Sección Inicio / Hero (Slider Full Width) -->
  <section id="inicio" class="seccion-inicio">
    <div class="texto-inicio-overlay">
      <svg viewBox="0 0 1000 410" width="100%" class="svg-texto-inicio">
        <text x="0" y="120" font-family="var(--font-main)" font-weight="900" font-size="154" textLength="1000"
          lengthAdjust="spacing" fill="#ffffff">DISEÑAMOS</text>
        <text x="0" y="252" font-family="var(--font-main)" font-weight="900" font-size="138" textLength="1000"
          lengthAdjust="spacing" fill="#ffffff">FABRICAMOS</text>
        <text x="0" y="388" font-family="var(--font-main)" font-weight="900" font-size="143" textLength="1000"
          lengthAdjust="spacing" fill="#ffffff">INSTALAMOS</text>
      </svg>
    </div>
    <div class="swiper swiper-inicio" style="width: 100%; height: 100%;">
      <div class="swiper-wrapper" id="inicio-wrapper"></div>
      <div class="swiper-pagination"></div>
      <div class="swiper-button-next"></div>
      <div class="swiper-button-prev"></div>
    </div>
  </section>

  <!-- Sección Nosotros (50/50) -->
  <section id="nosotros" class="seccion-nosotros">
    <!-- Mitad Slider -->
    <div class="nosotros-slider">
      <div class="swiper swiper-nosotros" style="width: 100%; height: 100%;">
        <div class="swiper-wrapper" id="nosotros-wrapper"></div>
        <div class="swiper-pagination"></div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
      </div>
    </div>
    <!-- Mitad Info -->
    <div class="nosotros-info">
      <h2>NOSOTROS</h2>
      <div class="caja-nosotros">
        <p id="nosotros-texto"></p>
      </div>
    </div>
  </section>

  <!-- Contenedor para inyectar Secciones de Productos dinámicamente -->
  <div id="contenedor-secciones-productos"></div>

  <!-- Sección Contacto -->
  <section id="contacto" class="seccion-contacto">
    <form id="form-contacto" class="formulario-contacto">
      <h2>CONTACTO</h2>
      <input type="text" id="contacto-nombre" name="nombre" placeholder="Nombre / Empresa" required>
      <textarea id="contacto-mensaje" name="mensaje" rows="4" placeholder="¿Qué querés consultarnos?"
        required></textarea>
      <button type="submit">ENVIAR CONSULTA</button>
    </form>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p>pie de pagina</p>
  </footer>

  <!-- Layout / Modal de Producto Individual -->
  <div id="modal-producto" class="modal-overlay">
    <div class="modal-content">
      <button class="btn-cerrar-modal" id="btn-cerrar-modal">&times;</button>

      <div class="modal-layout">
        <!-- Slider Modal -->
        <div class="modal-slider">
          <div class="swiper swiper-modal">
            <div class="swiper-wrapper" id="modal-wrapper">
              <!-- Inyectado por JS -->
            </div>
            <div class="swiper-pagination"></div>
            <div class="swiper-button-next" style="color:#d80000;"></div>
            <div class="swiper-button-prev" style="color:#d80000;"></div>
          </div>
        </div>

        <!-- Info Modal -->
        <div class="modal-info">
          <h3 id="modal-titulo">TÍTULO</h3>
          <p id="modal-desc">Descripción...</p>
          <a href="#" id="modal-whatsapp" class="btn-whatsapp" target="_blank">Consultar por esto en WhatsApp</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Botón WhatsApp global flotante -->
  <a href="#" id="whatsapp-flotante" class="btn-whatsapp-flotante" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/WhatsApp_icon.png" alt="WhatsApp" width="30"
      loading="lazy">
  </a>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
  <script src="datos.js?v=1.72"></script>
  <script src="app.js?v=1.72"></script>
</body>

</html>
